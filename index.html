<!DOCTYPE html>
<html>
<head>
    <title>Lexical Decision Task L2-L3</title>
    <script src="https://unpkg.com/jspsych@7.3.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
    <link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet" type="text/css" />
</head>
<body style="background-color: #808080;"></body>
<script>
    // 1. Participant setup
    var p_id = prompt("Enter Participant ID:", "1");
    var s_id = prompt("Enter Session ID:", "001");

    const jsPsych = initJsPsych({
        on_finish: function() {
            // Filter trials to get only word responses
            var trials = jsPsych.data.get().filterCustom(function(t) {
                return t.Lexicality !== undefined;
            });

            // Build CSV string with Semicolon (;) like Result_1.csv
            var csv = "Participant;Session;Block;Language;Item;Lexicality;Correct;RT\n";

            trials.values().forEach(function(d) {
                var block_label = (d.Language === "L2") ? "English (L2)" : "Spanish (L3)";
                var rt_seconds = (d.rt / 1000).toFixed(4); // Convert ms to seconds
                
                csv += p_id + ";" + 
                       s_id + ";" + 
                       block_label + ";" + 
                       d.Language + ";" + 
                       d.Item + ";" + 
                       d.Lexicality + ";" + 
                       d.Correct + ";" + 
                       rt_seconds + "\n";
            });

            // Auto-download the file
            var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            var link = document.createElement("a");
            var url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "Result_" + p_id + ".csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    });

    // 2. Instructions and Headers
    var instructions = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `<div style="color: white; font-family: Arial;"><h1>Instructions</h1><p>Press <b>J</b> for REAL WORDS.</p><p>Press <b>F</b> for PSEUDO-WORDS.</p><p>Press any key to see the first block language.</p></div>`
    };

    var english_header = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `<div style="color: white; font-family: Arial;"><h1>Start of Block: ENGLISH (L2)</h1><p>Press any key to begin.</p></div>`
    };

    var spanish_header = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `<div style="color: white; font-family: Arial;"><h1>Start of Block: SPANISH (L3)</h1><p>Press any key to begin.</p></div>`
    };

    // 3. Complete Stimuli Lists (English & Spanish)
    var english_stimuli = [
        {item: "yesterday", type: "word", lang: "L2"}, {item: "harmony", type: "word", lang: "L2"},
        {item: "melody", type: "word", lang: "L2"}, {item: "property", type: "word", lang: "L2"},
        {item: "customer", type: "word", lang: "L2"}, {item: "ordinary", type: "word", lang: "L2"},
        {item: "attitude", type: "word", lang: "L2"}, {item: "quantity", type: "word", lang: "L2"},
        {item: "industry", type: "word", lang: "L2"}, {item: "argument", type: "word", lang: "L2"},
        {item: "compromise", type: "word", lang: "L2"}, {item: "telephone", type: "word", lang: "L2"},
        {item: "happiness", type: "word", lang: "L2"}, {item: "wilderness", type: "word", lang: "L2"},
        {item: "brasticon", type: "pseudoword", lang: "L2"}, {item: "splandock", type: "pseudoword", lang: "L2"},
        {item: "grindifer", type: "pseudoword", lang: "L2"}, {item: "grasticon", type: "pseudoword", lang: "L2"},
        {item: "plimcaster", type: "pseudoword", lang: "L2"}, {item: "drimcaster", type: "pseudoword", lang: "L2"},
        {item: "scrandifer", type: "pseudoword", lang: "L2"}, {item: "brimcaster", type: "pseudoword", lang: "L2"},
        {item: "clandister", type: "pseudoword", lang: "L2"}, {item: "grimplock", type: "pseudoword", lang: "L2"}
    ];

    var spanish_stimuli = [
        {item: "cadera", type: "word", lang: "L3"}, {item: "corbata", type: "word", lang: "L3"},
        {item: "sombrero", type: "word", lang: "L3"}, {item: "regalo", type: "word", lang: "L3"},
        {item: "pulmones", type: "word", lang: "L3"}, {item: "ventana", type: "word", lang: "L3"},
        {item: "cartero", type: "word", lang: "L3"}, {item: "escuela", type: "word", lang: "L3"},
        {item: "naranja", type: "word", lang: "L3"}, {item: "revista", type: "word", lang: "L3"},
        {item: "dinero", type: "word", lang: "L3"}, {item: "hermano", type: "word", lang: "L3"},
        {item: "sapaso", type: "pseudoword", lang: "L3"}, {item: "bacola", type: "pseudoword", lang: "L3"},
        {item: "fotapa", type: "pseudoword", lang: "L3"}, {item: "liboco", type: "pseudoword", lang: "L3"},
        {item: "gumisa", type: "pseudoword", lang: "L3"}, {item: "foboba", type: "pseudoword", lang: "L3"},
        {item: "lireni", type: "pseudoword", lang: "L3"}, {item: "basase", type: "pseudoword", lang: "L3"},
        {item: "matuse", type: "pseudoword", lang: "L3"}, {item: "mareso", type: "pseudoword", lang: "L3"}
    ];

    // 4. Trial Template
    var trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
            return `<div style="font-size: 60px; color: white;">${jsPsych.timelineVariable('item')}</div>`;
        },
        choices: ['f', 'j'],
        data: {
            Language: jsPsych.timelineVariable('lang'),
            Lexicality: jsPsych.timelineVariable('type'),
            Item: jsPsych.timelineVariable('item'),
            correct_response: function() {
                return jsPsych.timelineVariable('type') === 'word' ? 'j' : 'f';
            }
        },
        on_finish: function(data) {
            data.Correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response) ? 1 : 0;
        }
    };

    // 5. Block Procedures
    var english_proc = { timeline: [trial], timeline_variables: english_stimuli, randomize_order: true };
    var spanish_proc = { timeline: [trial], timeline_variables: spanish_stimuli, randomize_order: true };

    // 6. Ending Screen (Ensures download triggers)
    var end_screen = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `<div style="color: white; font-family: Arial;"><h1>Thank you!</h1><p>The experiment is complete. Your data file should download now.</p></div>`,
        choices: "NO_KEYS",
        trial_duration: 3000
    };

    // 7. Timeline Run
    jsPsych.run([instructions, english_header, english_proc, spanish_header, spanish_proc, end_screen]);

</script>
</html>
