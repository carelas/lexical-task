<!DOCTYPE html>
<html>
<head>
    <title>Lexical Decision Task</title>
    <script src="https://unpkg.com/jspsych@7.3.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.2"></script>
    <link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet" type="text/css" />
</head>
<body></body>
<script>
    const jsPsych = initJsPsych({
        on_finish: function() {
            // Esto descarga el CSV automáticamente al final para que te lo manden
            jsPsych.data.get().localSave('csv', 'results_participant.csv');
        }
    });

    // Instrucciones basadas en tu KEY_WORD = 'j' y KEY_PSEUDO = 'f'
    var welcome = {
        type: jspsychHtmlKeyboardResponse,
        stimulus: "Welcome! <br> Press <b>J</b> for Words and <b>F</b> for Pseudowords. <br><br> Press any key to start.",
    };

    // Aquí pegarías tus palabras de ingles.csv y espanol.csv
    // Ejemplo de cómo estructurarlo:
    var stimuli_list = [
        { word: "yesterday", type: "word", lang: "L2" },
        { word: "brasticon", type: "pseudoword", lang: "L2" },
        { word: "cadera", type: "word", lang: "L3" },
        { word: "sapaso", type: "pseudoword", lang: "L3" }
    ];

    var trial = {
        type: jspsychHtmlKeyboardResponse,
        stimulus: function() { return jsPsych.timelineVariable('word')(); },
        choices: ['f', 'j'],
        data: {
            task: 'response',
            correct_response: function() {
                return jsPsych.timelineVariable('type')() == 'word' ? 'j' : 'f';
            }
        },
        on_finish: function(data) {
            data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
        }
    };

    var test_procedure = {
        timeline: [trial],
        timeline_variables: stimuli_list,
        randomize_order: true
    };

    jsPsych.run([welcome, test_procedure]);
</script>
</html>
